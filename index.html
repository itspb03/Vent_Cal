<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventilation Centrality Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{--bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;--border:#dee2e6;--text:#212529;--muted:#6c757d;--primary:#005a60;--primary-light:rgba(0,90,96,0.1);--accent:#d19900;--good:#2f7a1f;--shadow:0 4px 20px rgba(0,0,0,.05);--r:12px;--font-body:'Inter',sans-serif}
    [data-theme="dark"]{--bg:#121212;--surface:#1e1e1e;--surface2:#2d2d2d;--border:#383838;--text:#e0e0e0;--muted:#a0a0a0;--primary:#4db6ac;--primary-light:rgba(77,182,172,0.1);--accent:#ffd54f;--good:#81c784;--shadow:0 8px 32px rgba(0,0,0,.3)}
    
    *{box-sizing:border-box} 
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.6;padding-bottom:80px}
    .wrap{max-width:1100px;margin:0 auto;padding:40px 20px}
    
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;border-bottom:2px solid var(--border);padding-bottom:20px}
    .title h1{font-weight:800;font-size:2.2rem;letter-spacing:-0.03em;margin:0;color:var(--text);text-transform:tight}
    .title p{margin:5px 0 0;color:var(--muted);font-size:1rem}
    
    .btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;transition:all 0.2s}
    .btn:hover{background:var(--surface2);border-color:var(--muted)}
    .btn.primary{background:var(--primary);color:#fff;border-color:transparent}
    .btn.primary:hover{opacity:0.9;transform:translateY(-1px)}

    .layout-stack{display:flex;flex-direction:column;gap:32px}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
    .card{padding:24px}
    
    .input-grid{display:grid;grid-template-columns:1fr 2fr;gap:24px;align-items:start}
    label{display:block;font-size:.85rem;font-weight:700;margin-bottom:8px;text-transform:uppercase;color:var(--muted)}
    input,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit}
    textarea{min-height:120px;font-family:monospace;font-size:0.85rem}

    .metrics-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .metric{background:var(--surface);padding:20px;text-align:center}
    .metric .k{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    .metric .v{font-size:1.5rem;font-weight:800;color:var(--primary)}

    .subhead{margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
    .subhead h2{margin:0;font-size:1.25rem;font-weight:700}

    .net-container{background:var(--surface2);position:relative;width:100%;min-height:500px;display:flex;align-items:center;justify-content:center}
    svg{width:100%;height:100%;max-height:600px}
    
    table{width:100%;border-collapse:collapse}
    th,td{padding:14px;border-bottom:1px solid var(--border);text-align:left;font-size:0.9rem}
    th{background:var(--surface2);font-weight:700;color:var(--muted)}
    .badge{padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:700;text-transform:uppercase}
    .b-high{background:var(--primary);color:#white}
    .b-normal{background:var(--border);color:var(--muted)}

    @media (max-width:768px){ .input-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="title">
      <h1>Ventilation Centrality</h1>
      <p>Analyze branch criticality and airflow distribution</p>
    </div>
    <button class="btn" id="themeBtn">Toggle Mode</button>
  </header>

  <div class="layout-stack">
    <section class="panel card">
      <div class="input-grid">
        <div class="stack">
          <label>Data Import</label>
          <input id="fileInput" type="file" accept=".csv" style="margin-bottom:15px"/>
          <button class="btn primary" id="runBtn" style="width:100%">Update Analysis</button>
          <p id="detectedCols" style="font-size:0.75rem; color:var(--muted); margin-top:15px"></p>
        </div>
        <div>
          <label>CSV Content (Raw)</label>
          <textarea id="csvText">branch_id,from,to,R,Q,x1,y1,x2,y2
B1,N1,N2,0.004,62.8,0,0,120,0
B2,N1,N3,0.0048,57.2,0,0,0,90
B3,N2,N4,0.0085,37.0,120,0,220,40
B4,N2,N5,0.0155,25.9,120,0,160,120
B5,N3,N5,0.0155,26.0,0,90,160,120
B6,N3,N6,0.0085,31.2,0,90,-60,180
B7,N4,N7,0.014,37.0,220,40,260,140
B8,N5,N7,0.026,28.0,160,120,260,140
B9,N5,N8,0.020,23.8,160,120,210,220
B10,N6,N8,0.014,31.2,-60,180,210,220
B11,N7,N9,0.0115,38.4,260,140,340,160
B12,N8,N10,0.0105,55.0,210,220,320,260
B13,N9,N11,0.012,38.4,340,160,430,180
B14,N10,N11,0.008,38.7,320,260,430,180
B15,N7,N10,0.032,26.6,260,140,320,260
B16,N11,N12,0.0045,77.1,430,180,520,220
B17,N10,N12,0.021,42.9,320,260,520,220</textarea>
        </div>
      </div>
    </section>

    <div class="metrics-row">
      <div class="metric"><div class="k">Nodes</div><div class="v" id="mNodes">—</div></div>
      <div class="metric"><div class="k">Branches</div><div class="v" id="mEdges">—</div></div>
      <div class="metric"><div class="k">Max Centrality</div><div class="v" id="mMaxC">—</div></div>
      <div class="metric"><div class="k">Critical ID</div><div class="v" id="mTop">—</div></div>
    </div>

    <section class="panel card">
      <div class="subhead"><h2>Performance Analysis</h2></div>
      <canvas id="hybridChart" height="100"></canvas>
    </section>

    <section class="panel">
      <div class="card subhead" style="margin-bottom:0">
        <h2>Network Topology Map</h2>
        <div style="font-size:0.8rem; color:var(--muted)">
          <span style="color:var(--primary); font-weight:bold">● Critical Path</span> | <span>● Normal Branch</span>
        </div>
      </div>
      <div class="net-container" id="networkWrap"></div>
    </section>

    <section class="panel card">
      <div class="subhead"><h2>Detailed Branch Rankings</h2></div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Branch ID</th>
              <th>Path</th>
              <th>Resistance (R)</th>
              <th>Flow (Q)</th>
              <th>Betweenness</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<script>
const aliases = {
  branch:['branch_id','branch','edge','id'],
  u:['u','from','source','node1'],
  v:['v','to','target','node2'],
  R:['r','resistance'],
  Q:['q','flow','airflow'],
  x1:['x1','from_x','ux'], y1:['y1','from_y','uy'],
  x2:['x2','to_x','vx'], y2:['y2','to_y','vy']
};

let hybridChart, latest = [];

document.getElementById('themeBtn').onclick = () => {
  const root = document.documentElement;
  root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
};

function detect(headers,key){
  const pool=aliases[key]; 
  for(const h of headers){ if(pool.includes(h.toLowerCase().trim())) return h; } 
  return null;
}

function parseCSV(text){
  return Papa.parse(text.trim(),{header:true,skipEmptyLines:true}).data;
}

function edgeBetweenness(nodes, edges){
  const eb = new Map();
  edges.forEach(e => eb.set(e.id, 0));
  
  nodes.forEach(s => {
    const dist = new Map(nodes.map(n => [n, Infinity]));
    const sigma = new Map(nodes.map(n => [n, 0]));
    const pred = new Map(nodes.map(n => [n, []]));
    dist.set(s, 0); sigma.set(s, 1);
    
    const queue = [s];
    const stack = [];
    while(queue.length){
      const v = queue.shift();
      stack.push(v);
      const neighbors = edges.filter(e => e.u === v || e.v === v);
      neighbors.forEach(e => {
        const w = e.u === v ? e.v : e.u;
        const weight = e.R || 1;
        if(dist.get(w) === Infinity){
          dist.set(w, dist.get(v) + weight);
          queue.push(w);
        }
        if(dist.get(w) === dist.get(v) + weight){
          sigma.set(w, sigma.get(w) + sigma.get(v));
          pred.get(w).push(v);
        }
      });
    }
    const delta = new Map(nodes.map(n => [n, 0]));
    while(stack.length){
      const w = stack.pop();
      pred.get(w).forEach(v => {
        const c = (sigma.get(v)/sigma.get(w)) * (1 + delta.get(w));
        const edge = edges.find(e => (e.u===v && e.v===w) || (e.v===v && e.u===w));
        if(edge) eb.set(edge.id, eb.get(edge.id) + c);
        delta.set(v, delta.get(v) + c);
      });
    }
  });
  return eb;
}

function renderCharts(data){
  if(hybridChart) hybridChart.destroy();
  const ctx = document.getElementById('hybridChart').getContext('2d');
  
  hybridChart = new Chart(ctx, {
    data: {
      labels: data.map(d => d.id),
      datasets: [
        {
          type: 'bar',
          label: 'Edge Betweenness',
          data: data.map(d => d.eb),
          backgroundColor: '#005a60',
          yAxisID: 'y'
        },
        {
          type: 'line',
          label: 'Flow (Q)',
          data: data.map(d => d.Q),
          borderColor: '#d19900',
          borderWidth: 3,
          pointRadius: 4,
          tension: 0.3,
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: { type: 'linear', position: 'left', title: { display: true, text: 'Betweenness Centrality' } },
        y1: { type: 'linear', position: 'right', title: { display: true, text: 'Airflow (Q)' }, grid: { drawOnChartArea: false } }
      }
    }
  });
}

function drawNetwork(edges, nodes, topIds){
  const wrap = document.getElementById('networkWrap');
  const W = 1000, H = 500, pad = 50;
  
  // Coordinate scaling
  const xs = edges.flatMap(e => [e.x1, e.x2]).filter(v => v != null);
  const ys = edges.flatMap(e => [e.y1, e.y2]).filter(v => v != null);
  
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  
  const sx = v => pad + ((v - minX) / (maxX - minX || 1)) * (W - 2 * pad);
  const sy = v => H - pad - ((v - minY) / (maxY - minY || 1)) * (H - 2 * pad);

  const edgeMarkup = edges.map(e => {
    const isCritical = topIds.includes(e.id);
    const color = isCritical ? 'var(--primary)' : '#b0b0b0';
    const width = isCritical ? 5 : 1.5;
    const opacity = isCritical ? 1 : 0.4;
    
    return `<g>
      <line x1="${sx(e.x1)}" y1="${sy(e.y1)}" x2="${sx(e.x2)}" y2="${sy(e.y2)}" 
            stroke="${color}" stroke-width="${width}" stroke-opacity="${opacity}" />
      ${isCritical ? `<text x="${(sx(e.x1)+sx(e.x2))/2}" y="${(sy(e.y1)+sy(e.y2))/2 - 10}" 
             fill="${color}" font-weight="bold" font-size="12" text-anchor="middle">${e.id}</text>` : ''}
    </g>`;
  }).join('');

  const nodeSet = new Set();
  const nodeMarkup = edges.flatMap(e => {
    const res = [];
    if(!nodeSet.has(e.u)) {
      res.push(`<circle cx="${sx(e.x1)}" cy="${sy(e.y1)}" r="4" fill="var(--text)" />
                <text x="${sx(e.x1)+8}" y="${sy(e.y1)-8}" font-size="10" fill="var(--muted)">${e.u}</text>`);
      nodeSet.add(e.u);
    }
    if(!nodeSet.has(e.v)) {
      res.push(`<circle cx="${sx(e.x2)}" cy="${sy(e.y2)}" r="4" fill="var(--text)" />
                <text x="${sx(e.x2)+8}" y="${sy(e.y2)-8}" font-size="10" fill="var(--muted)">${e.v}</text>`);
      nodeSet.add(e.v);
    }
    return res;
  }).join('');

  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}">${edgeMarkup}${nodeMarkup}</svg>`;
}

function analyze(){
  const rows = parseCSV(document.getElementById('csvText').value);
  const headers = Object.keys(rows[0] || {});
  const cols = {
    u: detect(headers,'u'), v: detect(headers,'v'), id: detect(headers,'branch'),
    R: detect(headers,'R'), Q: detect(headers,'Q'),
    x1: detect(headers,'x1'), y1: detect(headers,'y1'),
    x2: detect(headers,'x2'), y2: detect(headers,'y2')
  };

  const nodes = [...new Set(rows.flatMap(r => [r[cols.u], r[cols.v]]))];
  const edges = rows.map((r, i) => ({
    id: r[cols.id] || `B${i+1}`,
    u: r[cols.u], v: r[cols.v],
    R: parseFloat(r[cols.R]) || 0.001,
    Q: parseFloat(r[cols.Q]) || 0,
    x1: parseFloat(r[cols.x1]) || 0, y1: parseFloat(r[cols.y1]) || 0,
    x2: parseFloat(r[cols.x2]) || 0, y2: parseFloat(r[cols.y2]) || 0
  }));

  const ebMap = edgeBetweenness(nodes, edges);
  const processed = edges.map(e => ({ ...e, eb: ebMap.get(e.id).toFixed(4) }))
                         .sort((a,b) => b.eb - a.eb);

  // Update UI
  document.getElementById('mNodes').textContent = nodes.length;
  document.getElementById('mEdges').textContent = edges.length;
  document.getElementById('mMaxC').textContent = processed[0].eb;
  document.getElementById('mTop').textContent = processed[0].id;

  const topCount = Math.ceil(processed.length * 0.2);
  const topIds = processed.slice(0, topCount).map(p => p.id);

  document.getElementById('resultsBody').innerHTML = processed.map((p, i) => `
    <tr>
      <td>${i+1}</td>
      <td><strong>${p.id}</strong></td>
      <td>${p.u} → ${p.v}</td>
      <td>${p.R}</td>
      <td>${p.Q}</td>
      <td>${p.eb}</td>
      <td><span class="badge ${i < topCount ? 'b-high' : 'b-normal'}">${i < topCount ? 'Critical' : 'Normal'}</span></td>
    </tr>
  `).join('');

  renderCharts(processed);
  drawNetwork(edges, nodes, topIds);
}

document.getElementById('runBtn').onclick = analyze;
document.getElementById('fileInput').onchange = (e) => {
  const f = e.target.files[0];
  if(f) Papa.parse(f, {header:true, complete: (res) => { 
    document.getElementById('csvText').value = Papa.unparse(res.data); 
    analyze(); 
  }});
};

// Initial run
analyze();
</script>

</body>
</html>
